# Single source for OpenShift/KFP and S3-related identity (nothing duplicated in benchmark.yaml).
# Copy to config/credentials.ini and fill in. Required to run the orchestrator.
#
# Discovery: --credentials PATH, or $BENCHMARK_CREDENTIALS_PATH, or config/credentials.ini

[kfp]
host = https://ds-pipeline-dspa-YOUR_PROJECT.apps.YOUR_CLUSTER.example.com
namespace = YOUR_DATA_SCIENCE_PROJECT
# token = sha256~...
token_file = /path/to/kfp_api_token.txt
# If no token/token_file: env var from token_env (default KFP_API_TOKEN)
# token_env = KFP_API_TOKEN
experiment_name = autogluon-benchmark

[storage]
train_data_bucket_name = your-benchmark-bucket
# Optional: S3 key layout is <artifact_s3_prefix>/<run_id>/leaderboard-evaluation/... (tabular).
# Defaults to autogluon-tabular-training-pipeline / autogluon-timeseries-training-pipeline if omitted.
# artifact_s3_prefix = autogluon-tabular-training-pipeline
# timeseries_artifact_s3_prefix = autogluon-timeseries-training-pipeline
# Set artifact_s3_prefix to empty to use legacy layout <run_id>/leaderboard-evaluation/...

[pipeline]
train_data_secret_name = automl-s3-credentials

# Values for oc create secret / same as pipeline pods expect (not sent to cluster by this tool).
# Also used after each successful run to list leaderboard HTML keys under train_data_bucket_name
# (see [storage] artifact_s3_prefix) and write ``leaderboard_html_s3_uri`` into the results CSV.
[s3]
endpoint = https://s3.openshift-storage.svc:9021
aws_access_key_id = YOUR_KEY
aws_secret_access_key = YOUR_SECRET
aws_default_region = us-east-1

# Optional — overrides benchmark.yaml [run] if present
# [run]
# top_n = 2
# poll_interval_seconds = 15
